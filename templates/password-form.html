{% extends "base.html" %}

{% block title %}Protected: {{ post_title }} - {{ site_name | default(value="RustPress") }}{% endblock %}

{% block content %}
<article class="single-post">
    <header class="entry-header content-area">
        <h1 class="entry-title">Protected: {{ post_title }}</h1>
    </header>

    <div class="entry-content content-area">
        <p>This content is password protected. To view it please enter your password below:</p>
        <form method="post" action="/wp-login.php?action=postpass" class="post-password-form">
            <input type="hidden" name="redirect_to" value="{{ redirect_to }}">
            <p>
                <label for="post_password">Password:</label>
                <input type="password" name="post_password" id="post_password" size="20" required>
            </p>
            <p>
                <button type="submit" class="submit-btn">Enter</button>
            </p>
        </form>
    </div>
</article>
{% endblock %}
