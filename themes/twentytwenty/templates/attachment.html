{% extends "base.html" %}

{% block title %}{{ the_title }} &#8211; {{ site_name | default(value="RustPress") }}{% endblock %}
{% block body_class %}attachment{% endblock %}

{% block content %}
<article class="page type-attachment status-publish hentry">
<header class="entry-header">
<h1 class="entry-title">{{ the_title }}</h1>
</header>
<div class="entry-content">
{{ the_content | safe }}
</div>
</article>
{% endblock %}
