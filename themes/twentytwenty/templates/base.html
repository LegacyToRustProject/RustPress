<!DOCTYPE html>
<html lang="{{ language | default(value='en-US') }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}{{ site_name | default(value="RustPress") }}{% endblock %}</title>
<link rel="stylesheet" href="/wp-content/themes/twentytwenty/style.css">
<link rel="stylesheet" href="/wp-content/themes/twentytwenty/theme-generated.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">
{% if canonical_url %}<link rel="canonical" href="{{ canonical_url }}">{% endif %}
{% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %} twentytwenty">
<div id="page" class="site">
<a class="screen-reader-text" href="#content">Skip to content</a>
{% include "header.html" %}
<div id="content" class="site-content">
{% block main %}
<div id="primary" class="content-area">
<main id="main" class="site-main">
{% block content %}{% endblock %}
</main>
</div>
{% endblock %}
</div>
{% include "footer.html" %}
</div>
</body>
</html>
