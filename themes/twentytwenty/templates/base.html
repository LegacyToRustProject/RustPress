<!DOCTYPE html>
<html class="no-js" lang="{{ lang | default(value='en-US') }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="profile" href="https://gmpg.org/xfn/11">
<title>{% block title %}{{ site_name | default(value="RustPress") }}{% endblock %}</title>
<link rel="stylesheet" id="twentytwenty-style-css" href="/wp-content/themes/twentytwenty/style.css">
<style id="twentytwenty-style-inline-css">

<link rel="stylesheet" id="twentytwenty-fonts-css" href="/wp-content/themes/twentytwenty/assets/css/font-inter.css">
<link rel="stylesheet" href="/wp-content/themes/twentytwenty/theme-generated.css">

{% block head %}{% endblock %}
<script>document.documentElement.className = document.documentElement.className.replace( 'no-js', 'js' );</script>
</head>
<body class="{% block body_class %}{% endblock %} wp-embed-responsive enable-search-modal has-no-pagination showing-comments show-avatars footer-top-hidden">
<a class="skip-link screen-reader-text" href="#site-content">Skip to the content</a>
{% include "header.html" %}
<main id="site-content">
{% block content %}{% endblock %}
</main>
{% include "footer.html" %}
</body>
</html>
