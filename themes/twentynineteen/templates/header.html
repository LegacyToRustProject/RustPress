<header id="masthead" class="site-header">
<div class="site-branding-container">
<div class="site-branding">
<p class="site-title"><a href="{{ site_url | default(value='/') }}" rel="home">{{ site_name | default(value="RustPress") }}</a></p>
{% if site_description %}<p class="site-description">{{ site_description }}</p>{% endif %}
</div>
</div>
{% if header_menu and header_menu | length > 0 %}
<nav id="site-navigation" class="primary-navigation" aria-label="Primary menu">
<ul>
{% for item in header_menu %}<li class="menu-item"><a href="{{ item.url }}">{{ item.label }}</a></li>{% endfor %}
</ul>
</nav>
{% endif %}
</header>
