<footer class="wp-block-template-part">
<div class="wp-block-group has-global-padding is-layout-constrained wp-block-group-is-layout-constrained" style="padding-top:var(--wp--preset--spacing--60);padding-bottom:var(--wp--preset--spacing--50);border-top:1px solid var(--wp--preset--color--accent)">

<div class="wp-block-group alignwide is-content-justification-space-between is-layout-flex wp-block-group-is-layout-flex" style="align-items:flex-start">

<div class="wp-block-column is-layout-flow wp-block-column-is-layout-flow">
<p class="wp-block-site-title" style="font-weight:600;font-size:1.2rem"><a href="{{ site_url | default(value='/') }}" rel="home">{{ site_name | default(value="RustPress") }}</a></p>
{% if site_description is defined and site_description %}<p class="wp-block-site-tagline has-contrast-2-color has-small-font-size">{{ site_description }}</p>{% endif %}
</div>

<nav class="is-vertical wp-block-navigation is-layout-flex wp-block-navigation-is-layout-flex" style="flex-direction:column;align-items:flex-start">
<ul class="wp-block-navigation__container is-vertical wp-block-navigation">
<li class="wp-block-navigation-item wp-block-navigation-link"><a class="wp-block-navigation-item__content" href="{{ site_url | default(value='') }}/"><span class="wp-block-navigation-item__label">Blog</span></a></li>
<li class="wp-block-navigation-item wp-block-navigation-link"><a class="wp-block-navigation-item__content" href="{{ site_url | default(value='') }}/about/"><span class="wp-block-navigation-item__label">About</span></a></li>
<li class="wp-block-navigation-item wp-block-navigation-link"><a class="wp-block-navigation-item__content" href="{{ site_url | default(value='') }}/contact/"><span class="wp-block-navigation-item__label">Contact</span></a></li>
</ul>
</nav>

</div>

<div style="height:var(--wp--preset--spacing--40)" aria-hidden="true" class="wp-block-spacer"></div>

<div class="wp-block-group alignwide is-content-justification-space-between is-layout-flex wp-block-group-is-layout-flex">
<p class="has-small-font-size has-contrast-2-color">Twenty Twenty-Four</p>
<p class="has-small-font-size has-contrast-2-color">Designed with <a href="https://wordpress.org" rel="nofollow">WordPress</a></p>
</div>

</div>
</footer>
