<header id="masthead" class="site-header">
<div class="inside-header">
<div class="site-branding">
<p class="site-title"><a href="{{ site_url | default(value='/') }}" rel="home">{{ site_name | default(value="RustPress") }}</a></p>
{% if site_description %}<p class="site-description">{{ site_description }}</p>{% endif %}
</div>
<nav id="site-navigation" class="main-navigation" aria-label="Primary menu">
<ul id="primary-menu">
{% if header_menu and header_menu | length > 0 %}
{% for item in header_menu %}
<li class="menu-item"><a href="{{ item.url }}">{{ item.label }}</a></li>
{% endfor %}
{% else %}
<li class="menu-item"><a href="{{ site_url | default(value='/') }}">Home</a></li>
<li class="menu-item"><a href="{{ site_url | default(value='/') }}/about">About</a></li>
<li class="menu-item"><a href="{{ site_url | default(value='/') }}/contact">Contact</a></li>
{% endif %}
</ul>
</nav>
</div>
</header>
