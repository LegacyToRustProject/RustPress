<!DOCTYPE html>
<html lang="{{ language | default(value='en-US') }}" class="no-js">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}{{ site_name | default(value="RustPress") }}{% endblock %}</title>
<meta name="generator" content="RustPress">
<link rel="stylesheet" href="/wp-content/themes/twentytwentythree/style.css">
<link rel="stylesheet" href="/wp-content/themes/twentytwentythree/theme-generated.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
{% if canonical_url %}<link rel="canonical" href="{{ canonical_url }}">{% endif %}
{% block head %}{% endblock %}
</head>
<body class="wp-singular {% block body_class %}{% endblock %} twentytwentythree">
<a class="skip-link screen-reader-text" href="#content">Skip to content</a>
<div class="wp-site-blocks">
{% include "header.html" %}
<div id="content" class="site-content">
{% block main %}
<main class="wp-block-group is-layout-flow wp-block-group-is-layout-flow">
<div class="wp-block-group alignfull has-global-padding is-layout-constrained wp-block-group-is-layout-constrained" style="padding-top:var(--wp--preset--spacing--50);padding-bottom:var(--wp--preset--spacing--50)">
{% block content %}{% endblock %}
</div>
</main>
{% endblock %}
</div>
{% include "footer.html" %}
</div>
</body>
</html>
